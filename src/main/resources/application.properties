spring.application.name=api-mice-replicacao-backend
server.port=${node.porta}

spring.datasource.url=jdbc:postgresql://localhost:5432/api_mice_replicacao
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

django.api.base-url=http://localhost:8000/api
django.api.paises-path=/paises
django.api.estados-path=/estados
django.api.cidades-path=/cidades
django.api.empresas-path=/empresas
django.api.filiais-path=/filiais
django.api.usuarios-path=/usuarios

node.id=1
node.host=localhost
node.porta=8080

election.timeout-ms=5000
heartbeat.interval-ms=5000
heartbeat.timeout-ms=15000
replicacao.interval-ms=60000
